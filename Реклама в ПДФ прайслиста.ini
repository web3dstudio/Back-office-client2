Реклама в ПДФ прайслиста. 

Страница Лейаутс
- на странце отображены все доступные макеты для размещения в прайслисте
- возможна хагрузка форматов PDF, EPS, JPG, TIF
- после загрузки макета, он автоматически конвертируется в PDF
- файлы загружаемые в формате ПДФ не конвертируются
- Сохраняются и доступны для скачивания оригинальные файлы
- возможно загружать до 5 макетов за раз
- для того чтобы макет был доступен для размещения от дожен иметь статус "активный"
- для вертикальных макетов олжно быть указано место размещения - слева или справа. Без указания места макет нельзя сделать активным. 
- для горизонтальных макетов ориентация определяется автоматически по размеру макета при загрузке

Есть 3 вида макетов:
- горизонтальный - 300 на 145 мм
- вертикальный слева - 15 на 250 мм
- вертикальный справа - 15 на 250 мм

Вертикальные макты размещаются так - правый на развороте спача на четных страницах, левый на развороте спача на нечетных страницах.

Вертикальные макеты должны иметь припуски под обрезку для типографии - 5 мм. Видимое рекламное поле после обреза - 10 на 240 мм.
В тестовых файлах видимое поле - красное, под обрезку - голубое.

Странца Расписание
- на странце отображаются макеты, которые будут размещены в прайслисте в указанный период
- для того чтобы макет появился в прайслисте его расписание должно быть активным

В расписании задаются рараметры размещения макета в прайслисте:
- дата начала и дата окончания размещения
- номер страницы начала и номер страницы окончания размещения
- приоритет размещения 1 - высокий, 9 - низкий
- количество повторений

Если для одного и того же периода и диапазона страниц настроены 3 макета A, B, C с одинаковым приоритетом, и повторения такие: A=3, B=2, C=1, то порядок по страницам будет:
A, A, A, B, B, C, A, A, A, B, B, C, ...

Если приоритет разный, то используется только группа с самым высоким приоритетом (например, приоритет 1 важнее 2). Макеты с более низким приоритетом в этом случае не участвуют.
Пример:
Макеты A, B, C имеют приоритет 1, повторения A=3, B=2, C=1 то порядок по страницам будет:
A, A, A, B, B, C, A, A, A, B, B, C, ...
Макет D имеет приоритет 2 → не будет вставляться, пока есть подходящие макеты с приоритетом 1.

